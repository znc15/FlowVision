name: Deploy Docs & Website

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 构建项目网站
      - name: 构建网站
        run: pnpm --filter @flowvision/website build

      # 安装 Mintlify CLI 并导出静态文档
      - name: 安装 Mintlify CLI
        run: npm install -g mintlify@latest

      - name: 导出 Mintlify 文档
        working-directory: docs
        run: mintlify export --output export.zip

      # 合并网站和文档到统一输出目录
      - name: 合并输出
        run: |
          mkdir -p _site
          cp -r packages/website/dist/* _site/
          mkdir -p _site/docs
          if [ -f docs/export.zip ]; then
            unzip -o docs/export.zip -d _site/docs/
          fi

      # Mintlify 导出的 Next.js 静态站使用绝对路径 /_next/，
      # 部署在 /FlowVision/docs/ 子路径下需要重写为正确前缀
      - name: 修正文档资源路径
        run: |
          echo "重写 /_next/ 为 /FlowVision/docs/_next/ ..."
          find _site/docs -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) \
            -exec sed -i 's|"/_next/|"/FlowVision/docs/_next/|g' {} + \
            -exec sed -i "s|'/_next/|'/FlowVision/docs/_next/|g" {} + \
            -exec sed -i 's|=/_next/|=/FlowVision/docs/_next/|g' {} +
          # 修正其它可能的绝对路径引用（如字体、图片）
          find _site/docs -type f -name "*.html" \
            -exec sed -i 's|href="/|href="/FlowVision/docs/|g' {} + \
            -exec sed -i 's|src="/|src="/FlowVision/docs/|g' {} +
          echo "路径重写完成"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
