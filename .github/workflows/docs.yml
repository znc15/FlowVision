name: Deploy Docs & Website

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 构建项目网站
      - name: 构建网站
        run: pnpm --filter @flowvision/website build

      # 安装 Mintlify CLI 并导出静态文档
      - name: 安装 Mintlify CLI
        run: npm install -g mintlify@latest

      - name: 导出 Mintlify 文档
        working-directory: docs
        run: mintlify export --output export.zip

      # 合并网站和文档到统一输出目录
      - name: 合并输出
        run: |
          mkdir -p _site
          cp -r packages/website/dist/* _site/
          mkdir -p _site/docs
          if [ -f docs/export.zip ]; then
            unzip -o docs/export.zip -d _site/docs/
          fi

      # Mintlify 导出的 Next.js 静态站使用绝对路径，
      # 部署在 /FlowVision/docs/ 子路径下需全面重写路径
      # 分两层：1) 静态文本替换  2) 运行时 fetch/XHR 猴子补丁
      - name: 修正文档资源路径
        run: |
          cat > /tmp/rewrite-paths.js << 'REWRITE_SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const PREFIX = '/FlowVision/docs';
          const GUARD = /FlowVision\/docs/;

          function walk(dir) {
            const out = [];
            for (const f of fs.readdirSync(dir)) {
              const p = path.join(dir, f);
              if (fs.statSync(p).isDirectory()) out.push(...walk(p));
              else out.push(p);
            }
            return out;
          }

          const files = walk('_site/docs');
          let changed = 0;

          for (const file of files) {
            const ext = path.extname(file).toLowerCase();
            if (!['.html', '.js', '.css', '.json'].includes(ext)) continue;

            let c = fs.readFileSync(file, 'utf-8');
            const orig = c;

            if (ext === '.js' || ext === '.json') {
              // 替换所有 "/ 和 '/ 开头的绝对路径字符串
              c = c.replace(/"\/(?!\/|FlowVision\/docs)/g, '"' + PREFIX + '/');
              c = c.replace(/'\/(?!\/|FlowVision\/docs)/g, "'" + PREFIX + '/');
            }

            if (ext === '.css') {
              c = c.replace(/url\(\/(?!FlowVision)/g, 'url(' + PREFIX + '/');
              c = c.replace(/url\("\/(?!FlowVision)/g, 'url("' + PREFIX + '/');
              c = c.replace(/url\('\/(?!FlowVision)/g, "url('" + PREFIX + '/');
            }

            if (ext === '.html') {
              c = c.replace(/href="\/(?!FlowVision)/g, 'href="' + PREFIX + '/');
              c = c.replace(/src="\/(?!FlowVision)/g, 'src="' + PREFIX + '/');
              c = c.replace(/content="\/(?!FlowVision)/g, 'content="' + PREFIX + '/');
              c = c.replace(/action="\/(?!FlowVision)/g, 'action="' + PREFIX + '/');

              // 注入运行时猴子补丁：拦截 fetch / XHR 动态请求并补全前缀
              const rt = [
                '<script>(function(){',
                'var P="' + PREFIX + '";',
                'var oF=window.fetch;',
                'window.fetch=function(u,o){',
                  'if(typeof u==="string"&&u.charAt(0)==="/"&&!u.startsWith(P)&&u.charAt(1)!=="/"){u=P+u}',
                  'return oF.call(this,u,o)};',
                'var oX=XMLHttpRequest.prototype.open;',
                'XMLHttpRequest.prototype.open=function(){',
                  'var u=arguments[1];',
                  'if(typeof u==="string"&&u.charAt(0)==="/"&&!u.startsWith(P)&&u.charAt(1)!=="/"){arguments[1]=P+u}',
                  'return oX.apply(this,arguments)};',
                '})();</script>'
              ].join('');
              c = c.replace(/<head>/i, '<head>' + rt);
            }

            if (c !== orig) { fs.writeFileSync(file, c); changed++; }
          }
          console.log('重写了 ' + changed + ' 个文件');
          REWRITE_SCRIPT
          node /tmp/rewrite-paths.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
