name: 构建桌面应用

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 发布前检查
        run: pnpm release:check

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_script: build:win
          - os: macos-latest
            platform: mac
            build_script: build:mac
          - os: ubuntu-latest
            platform: linux
            build_script: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行测试
        run: pnpm test:run

      - name: 构建前端和后端
        run: pnpm turbo run build --filter=@flowvision/frontend --filter=@flowvision/backend

      - name: 打包后端为单文件
        run: pnpm --filter @flowvision/backend build:bundle

      - name: 打包桌面应用 (${{ matrix.platform }} x64 + arm64)
        run: pnpm --filter @flowvision/desktop ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: FlowVision-${{ matrix.platform }}
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.AppImage
          if-no-files-found: ignore
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 列出待发布文件
        run: find artifacts -type f | sort

      - name: 发布正式 Release（Tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 更新滚动预览版（main 分支推送）
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新构建（Latest）
          body: |
            ⚠️ 这是基于 `main` 分支自动构建的预览版，不代表正式发布版本。

            - **提交**：`${{ github.sha }}`
            - **构建时间**：${{ github.event.head_commit.timestamp }}
            - **构建信息**：${{ github.event.head_commit.message }}
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
